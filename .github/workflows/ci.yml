name: Healthcare EHR Web App CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './app/src/package.json'

    - name: Install dependencies
      run: |
        cd app/src
        npm install

    - name: Run code security audit
      run: |
        cd app/src
        npm audit --audit-level=high || true

    - name: Dockerfile Lint validation
      run: |
        # Basic regex checks for Dockerfile security
        grep -q "FROM" app/src/Dockerfile || (echo "Missing FROM instruction" && exit 1)
        grep -i -q "alpine" app/src/Dockerfile && echo "✅ Alpine optimized base image detected." || echo "⚠️ Warning: Not using Alpine image."
