# Logstash Pipeline Configuration for EHR Platform
# This pipeline processes stdout container logs from K3s pods and ships them to Elasticsearch.

input {
  file {
    path => "/var/log/containers/ehr-app-*.log"
    type => "kubernetes-ehr"
    start_position => "beginning"
    codec => json
  }
}

filter {
  if [type] == "kubernetes-ehr" {
    # Parse EJS/Express Console JSON output logs if they exist
    json {
      source => "message"
      target => "app_log"
      skip_on_invalid_json => true
    }
    
    # Mutate filters to separate patient diagnostic logs from health checks
    mutate {
      add_field => { "environment" => "production" }
      add_field => { "application" => "ehr-app" }
    }
    
    # Exclude basic health check messages to reduce index bloat
    if [message] =~ "GET /health" {
      drop { }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch.monitoring.svc.cluster.local:9200"]
    index => "ehr-healthcare-logs-%{+YYYY.MM.dd}"
  }
  
  stdout {
    codec => rubydebug
  }
}
